# .github/workflows/release.yml
#
# Automated release on every push to main.
# Bumpcraft reads your conventional commits, bumps the version,
# generates a changelog, and creates a GitHub release.
#
# Setup:
#   1. Copy this file to .github/workflows/release.yml in your repo
#   2. Run `npx bumpcraft init` to create .bumpcraftrc.json
#   3. Push to main — the workflow handles the rest
#
# Required secrets: none (uses built-in GITHUB_TOKEN)

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for commit analysis

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Preview first — skip if nothing to release
      - name: Check for release
        id: check
        run: |
          npx bumpcraft validate > /dev/null 2>&1 && echo "release=true" >> $GITHUB_OUTPUT || echo "release=false" >> $GITHUB_OUTPUT

      - name: Release
        if: steps.check.outputs.release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npx bumpcraft release --approve
          git add package.json CHANGELOG.md .bumpcraft/
          git commit -m "chore(release): $(node -p \"require('./package.json').version\")" || true
          git push
          git push --tags
