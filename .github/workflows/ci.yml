# CI/CD pipeline — currently disabled, trigger manually via workflow_dispatch
name: CI

on:
  workflow_dispatch: # manual trigger only — uncomment below to enable on push/PR
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bumpcraft/package-lock.json
      - run: cd bumpcraft && npm ci
      - run: cd bumpcraft && npm run lint
      - run: cd bumpcraft && npm test
      - run: cd bumpcraft && npm run build

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bumpcraft/package-lock.json
      - run: cd bumpcraft && npm ci
      - run: cd bumpcraft && npm run build
      - run: cd bumpcraft && npx bumpcraft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUMPCRAFT_API_KEY: ${{ secrets.BUMPCRAFT_API_KEY }}
