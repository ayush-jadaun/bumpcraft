# Bumpcraft CI/CD — runs tests on every push/PR, releases on main via bumpcraft itself
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Fetch all tags explicitly
      - run: git fetch --tags --force

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      # Check if there are releasable commits
      - name: Check for release
        id: check
        run: |
          node dist/cli/index.js validate && echo "release=true" >> $GITHUB_OUTPUT || {
            code=$?
            if [ $code -eq 2 ]; then
              echo "No releasable commits — skipping release"
              echo "release=false" >> $GITHUB_OUTPUT
            else
              echo "Validate failed with code $code"
              exit $code
            fi
          }

      # Run bumpcraft on itself — --push handles commit, tag, and push
      - name: Release
        if: steps.check.outputs.release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node dist/cli/index.js release --approve --push

      # Publish to npm (only if NPM_TOKEN is configured)
      - name: Publish to npm
        if: steps.check.outputs.release == 'true' && env.HAS_NPM_TOKEN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
        run: npm publish
