# Bumpcraft CI/CD — runs tests on every push/PR, releases on main via bumpcraft itself
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  release:
    needs: test
    runs-on: ubuntu-latest
    # Only release on direct pushes to main, skip if the commit is from the bot (prevents infinite loop)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      # Check if there are releasable commits since last tag
      - name: Check for release
        id: check
        run: |
          if node dist/cli/index.js validate; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ]; then
              echo "No releasable commits found"
              echo "release=false" >> $GITHUB_OUTPUT
            else
              echo "Validate failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi

      # Run bumpcraft on itself
      - name: Release
        if: steps.check.outputs.release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node dist/cli/index.js release --approve
          git add package.json CHANGELOG.md .bumpcraft/
          git commit -m "chore(release): $(node -p "require('./package.json').version")" || true
          git push
          git push --tags

      # Publish to npm (only if NPM_TOKEN is configured)
      - name: Publish to npm
        if: steps.check.outputs.release == 'true' && env.NPM_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
