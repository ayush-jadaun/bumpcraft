version: '3.8'
services:
  bumpcraft-api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - BUMPCRAFT_API_KEY=${BUMPCRAFT_API_KEY}
      - BUMPCRAFT_AUTH_ALL=${BUMPCRAFT_AUTH_ALL:-false}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-}
      - PORT=3000
    volumes:
      - .:/app/workspace
    working_dir: /app/workspace
